<link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
    <div class="nav-bar">
        <img src="./images/logo-web.svg" width="50px" height="50px">
        <a href="#">Inicio</a>
        <a href="#">Sobre mí</a>
        <a href="#">Curriculum</a>
        <a href="#">Experiencias</a>
        <a href="#">Lenguajes</a>
        <a href="./contacto.html">Contacto</a>
    </div>
    <h1 id="contacto-titulo">Contacto</h1>
    <div class="linea-horizontal"></div>
    <div class="formulario-contacto">
        <input type="text" id="nombre" placeholder="Tu nombre" required>
        <input type="email" id="email" placeholder="Tu mail de contacto" required>
        <textarea id="mensaje" placeholder="Tu mensaje" required></textarea>
        <button type="button" onclick="enviarEmail()">Enviar</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        emailjs.init("TU PUBLIC KEY EN emailjs.com");

        function enviarEmail() {
            emailjs.send("EL SERVICE ID EN emailjs.com","EL ID DEL TEMPLATE EN emailjs.com", {
                nombre: document.getElementById("nombre").value,
                email: document.getElementById("email").value,
                mensaje: document.getElementById("mensaje").value,
            })
            .then(() => alert("¡Mensaje enviado!"))
            .catch((error) => alert("Error: " + JSON.stringify(error)))
        }
    </script>
</body>
</html>
